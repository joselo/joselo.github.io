<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Source+Code+Pro" rel="stylesheet" >

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="components/header.js" type="text/javascript" defer></script>
    <script type="module" src="https://md-block.verou.me/md-block.js"></script>
    <script type="module" src="js/app.js"></script>

    <style type="text/tailwindcss" media="screen">
      @tailwind base;
      @tailwind components;
      @tailwind utilities;

      @layer base {
        md-block h1 {
          @apply text-slate-900 dark:text-white tracking-tight text-2xl sm:text-3xl font-extrabold mb-4;
        }

        md-block img {
          @apply rounded mb-4;
        }

        md-block p {
          @apply mb-4 text-justify;
        }

        md-block pre {
          @apply mb-4;
        }

        md-block ul {
          @apply mb-4;
        }
      }

      @layer components {
        .primary-link {
          @apply hover:text-sky-500 dark:hover:text-sky-400 dark:text-white transition-colors duration-300;
        }

        .link {
          @apply underline decoration-sky-500 dark:decoration-sky-400 hover:decoration-double dark:text-white;
        }
      }
    </style>

    <link rel="stylesheet" href="css/app.css">
  </head>

  <!-- <body class="bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400"> -->
  <body class="antialiased text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-900">
    <header-component></header-component>

    <main class="container max-w-xl mx-auto p-4 lg:p-8">
      <md-block src="p/2023/jan/24.md"></md-block>
      <a href="http://www.url.com" target="_blank" class="link underline decoration-sky-500 dark:decoration-sky-400 ">Anchor Text</a>
    </main>
  </body>
</html>
