<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Condiment" rel="stylesheet" >
    <link rel="stylesheet" href="css/app.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="components/header.js" type="text/javascript" defer></script>
    <script type="module" src="https://md-block.verou.me/md-block.js"></script>
    <script type="module" src="js/app.js"></script>

    <style type="text/tailwindcss" media="screen">
      .primary-link {
        @apply hover:text-sky-500 dark:hover:text-sky-400 dark:text-white transition-colors duration-300;
      }

      .link {
        @apply underline decoration-sky-500 dark:decoration-sky-400 hover:decoration-double dark:text-white;
      }

      md-block h1 {
        @apply text-slate-900 dark:text-white tracking-tight text-2xl sm:text-3xl font-extrabold mb-4;
      }

      md-block img {
        @apply rounded my-4;
      }

      md-block p {
        @apply my-4 text-justify;
      }

      md-block pre {
        @apply my-4;
      }

      md-block ul {
        @apply my-4;
      }

      md-block a {
        @apply link;
      }

      /* Video Link */
      md-block a img {
        @apply rounded;
      }
    </style>
  </head>

  <body class="antialiased text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-900">
    <header-component></header-component>

    <main class="container max-w-xl mx-auto p-4 lg:p-8">
      <md-block src="p/2023/jan/24.md"></md-block>

      <!-- <iframe width="100%" height="315" src="https://www.youtube.com/embed/hCtTN4J_OeM?clip=UgkxgEA6SDqxwtq-nJL_0taPHQLLWLKfcrWf&amp;clipt=ENiIEBi43RM" title="Iron Maiden" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe> -->
    </main>
  </body>
</html>
